<div class="update-post-container">
  <!-- Loading State -->
  <div *ngIf="isLoading" class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="sr-only">Chargement...</span>
    </div>
    <p class="mt-2">Chargement du post...</p>
  </div>

  <!-- Update Form -->
  <div *ngIf="!isLoading && post" class="update-form">
    <h2 class="update-post-title">
      <i class="fas fa-edit"></i> 
      Mettre à jour le Post - Forum Pédiatrique
    </h2>

    <form (ngSubmit)="onSubmit()">
      <!-- Post Type -->
      <div class="form-group">
        <label for="postType">Type de Post</label>
        <select 
          id="postType" 
          class="form-control" 
          [(ngModel)]="post.postType"
          required>
          <option value="FORUM">Discussion Forum</option>
          <option value="ANNOUNCEMENT">Annonce Médicale</option>
          <option value="MEDICAL_UPDATE">Mise à jour Médicale</option>
          <option value="FOLLOW_UP">Suivi Pédiatrique</option>
        </select>
      </div>

      <!-- Title -->
      <div class="form-group">
        <label for="title">Titre du Post</label>
        <input
          type="text"
          id="title"
          class="form-control"
          [(ngModel)]="post.title"
          placeholder="Ex: Mise à jour sur la transplantation pédiatrique..."
          required
          minlength="3"
        />
      </div>

      <!-- Content -->
      <div class="form-group">
        <label for="content">Contenu</label>
        <textarea
          id="content"
          class="form-control"
          [(ngModel)]="post.content"
          rows="6"
          placeholder="Mettez à jour les informations médicales pédiatriques..."
          required
          minlength="10"
        ></textarea>
      </div>

      <!-- Current Image -->
      <div *ngIf="post.picture" class="form-group">
        <label>Image Actuelle</label>
        <div class="current-image">
          <img [src]="'http://localhost:8080/api/posts/images/' + post.picture" 
               class="preview-image" 
               alt="Image actuelle du post">
          <button type="button" 
                  class="btn btn-danger btn-sm" 
                  (click)="removeImage()">
            <i class="fas fa-trash"></i> Supprimer
          </button>
        </div>
      </div>

      <!-- File Upload -->
      <div class="form-group">
        <label for="file">Changer l'image (optionnel)</label>
        <input 
          type="file" 
          id="file" 
          class="form-control"
          (change)="onImageUpload($event)"
          accept="image/*">
      </div>

      <!-- Submit and Cancel Buttons -->
      <div class="form-actions">
        <button 
          type="submit" 
          class="btn btn-primary"
          [disabled]="isSubmitting">
          <span *ngIf="!isSubmitting">
            <i class="fas fa-save"></i> Mettre à jour
          </span>
          <span *ngIf="isSubmitting">
            <i class="fas fa-spinner fa-spin"></i> Mise à jour en cours...
          </span>
        </button>
        <button 
          type="button" 
          (click)="cancel()" 
          class="btn btn-secondary">
          <i class="fas fa-times"></i> Annuler
        </button>
      </div>
    </form>
  </div>

  <!-- Post Not Found -->
  <div *ngIf="!isLoading && !post" class="text-center py-5">
    <i class="fas fa-exclamation-triangle fa-3x text-warning mb-3"></i>
    <h4>Post non trouvé</h4>
    <p class="text-muted">Le post que vous essayez de modifier n'existe pas.</p>
    <button class="btn btn-primary" (click)="cancel()">
      <i class="fas fa-arrow-left"></i> Retour
    </button>
  </div>
</div>
