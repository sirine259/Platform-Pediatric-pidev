server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: kidneytransplant-forum-service
          uri: lb://kidneytransplant-forum-service
          predicates:
            - Path=/api/transplant/**,/api/forum/**
          filters:
            - StripPrefix=0

eureka:
  client:
    enabled: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

