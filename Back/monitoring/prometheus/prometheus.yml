global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'forum-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8091']
        labels:
          application: 'forum'
          service: 'kidneytransplant-forum-service'

  - job_name: 'kidneytransplant-service'
    metrics_path: '/actuator/prometheus'
    scrape_interval: 5s
    static_configs:
      - targets: ['host.docker.internal:8091']
        labels:
          application: 'kidneytransplant'
          service: 'kidneytransplant-forum-service'
