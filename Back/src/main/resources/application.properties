spring.application.name=PlatformePediatricBack

# Database Configuration - H2 for development
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.h2.console.enabled=true

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.defer-datasource-initialization=true

# Server Configuration
server.port=8091
server.servlet.context-path=/api

# Security Configuration
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN

# JWT Configuration
jwt.secret=pediatricPlatformSecretKey2024
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# Mail Configuration - Mailtrap
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=b8e4801a0b293e
spring.mail.password=e58b7b5834ff08
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=*
spring.mail.from.email=sirine.hamzaoui@esprit.tn
spring.mail.from.name=Plateforme Pédiatrique

# Email Templates
spring.mail.templates.forgot-password.subject=Réinitialisation de votre mot de passe - Plateforme Pédiatrique
spring.mail.templates.forgot-password.template=forgot-password
spring.mail.templates.password-reset.subject=Confirmation de réinitialisation - Plateforme Pédiatrique
spring.mail.templates.password-reset.template=password-reset

# CORS Configuration
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:4200
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Logging Configuration
logging.level.com.esprit.platformepediatricback=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Actuator Configuration
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Application Configuration
app.name=Pediatric Platform
app.version=1.0.0
app.description=Comprehensive Pediatric Healthcare Platform
